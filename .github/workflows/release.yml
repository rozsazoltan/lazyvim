name: Release
run-name: Release v${{ inputs.version }} from ${{ inputs.target_branch }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, without leading v. Example: 0.1.1"
        required: true
        type: string
      target_branch:
        description: "Branch to release from and squash version updates into"
        required: true
        default: master
        type: string
      draft:
        description: "Create the GitHub Release as a draft"
        required: true
        default: false
        type: boolean
      prerelease:
        description: "Mark the GitHub Release as a prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.target_branch }}-${{ inputs.version }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      release_ref: ${{ steps.final.outputs.release_ref }}
      changed: ${{ steps.diff.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate version
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          if [[ ! "$version" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid SemVer version: $version" >&2
            exit 2
          fi
          tag="v${version}"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag already exists: ${tag}" >&2
            exit 2
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Update Rust package version
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re

          version = "${{ steps.meta.outputs.version }}"
          root = Path.cwd()
          semver = re.compile(r"^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?$")

          if not semver.match(version):
              raise SystemExit(f"Invalid SemVer version: {version}")

          def replace_once(path: Path, pattern: str, replacement: str) -> None:
              text = path.read_text(encoding="utf-8")
              updated, count = re.subn(pattern, replacement, text, count=1, flags=re.MULTILINE)
              if count != 1:
                  raise SystemExit(f"Could not update {path}")
              path.write_text(updated, encoding="utf-8")

          replace_once(root / "Cargo.toml", r'^version\s*=\s*"[^"]+"', f'version = "{version}"')
          replace_once(root / "Cargo.lock", r'(?m)(^name\s*=\s*"lazyvim"\nversion\s*=\s*)"[^"]+"', rf'\1"{version}"')
          PY
          cargo generate-lockfile

      - name: Check whether package version changed
        id: diff
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- Cargo.toml Cargo.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Squash version changes into target branch
        if: steps.diff.outputs.changed == 'true'
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
        shell: bash
        run: |
          set -euo pipefail
          release_branch="chore/release-${VERSION}"
          title="chore(release): ${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -B "$release_branch"
          git add Cargo.toml Cargo.lock
          git commit -m "$title"
          git push --force origin "HEAD:${release_branch}"

          git fetch origin "$TARGET_BRANCH"
          git checkout -B "$TARGET_BRANCH" "origin/${TARGET_BRANCH}"
          git merge --squash "$release_branch"
          git commit -m "$title"
          git push origin "HEAD:${TARGET_BRANCH}"

      - name: Delete temporary release branch
        if: always()
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          INPUT_VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          version="${VERSION:-}"
          if [[ -z "$version" ]]; then
            version="${INPUT_VERSION#v}"
          fi

          release_branch="chore/release-${version}"

          if [[ ! -d .git ]]; then
            echo "No git checkout is available. Skipping release branch cleanup."
            exit 0
          fi

          if git ls-remote --exit-code --heads origin "$release_branch" >/dev/null 2>&1; then
            echo "Deleting temporary release branch: ${release_branch}"
            git push origin --delete "$release_branch"
          else
            echo "Temporary release branch does not exist: ${release_branch}"
          fi

      - name: Resolve release ref
        id: final
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin "${{ inputs.target_branch }}"
          release_ref="$(git rev-parse "origin/${{ inputs.target_branch }}")"
          echo "release_ref=${release_ref}" >> "$GITHUB_OUTPUT"
          echo "Release ref: ${release_ref}"

  build:
    name: Build ${{ matrix.platform }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-musl
            asset: lazyvim-linux-x86_64
          - platform: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: lazyvim-windows-x86_64.exe
          - platform: macos-x86_64
            os: macos-15-intel
            target: x86_64-apple-darwin
            asset: lazyvim-macos-x86_64
          - platform: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            asset: lazyvim-macos-arm64
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.release_ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Prepare executable asset
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          extension=""
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            extension=".exe"
          fi

          source="target/${{ matrix.target }}/release/lazyvim${extension}"
          asset="dist/${{ matrix.asset }}"

          cp "$source" "$asset"
          if [[ "$extension" != ".exe" ]]; then
            chmod 755 "$asset"
          fi

          if [[ "${{ matrix.target }}" == "x86_64-unknown-linux-musl" ]]; then
            file "$asset"
            ldd "$asset" 2>&1 | tee dist/linux-linkage.txt || true
          fi

          ls -lah "$asset"

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error
          retention-days: 7

  smoke:
    name: Smoke ${{ matrix.platform }}
    needs:
      - prepare
      - build
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            os: ubuntu-22.04
            asset: lazyvim-linux-x86_64
          - platform: windows-x86_64
            os: windows-latest
            asset: lazyvim-windows-x86_64.exe
          - platform: macos-x86_64
            os: macos-15-intel
            asset: lazyvim-macos-x86_64
          - platform: macos-arm64
            os: macos-latest
            asset: lazyvim-macos-arm64
    steps:
      - name: Download executable artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: smoke-bin

      - name: Smoke test executable on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          exe="smoke-bin/${{ matrix.asset }}"
          home="${RUNNER_TEMP}/lazyvim-home"
          rm -rf "$home"
          chmod +x "$exe"

          "$exe" --version
          "$exe" --home "$home" install-deps
          "$exe" --home "$home" doctor 2>&1 | tee doctor.log
          if grep -F "[fail]" doctor.log; then
            exit 1
          fi
          "$exe" --home "$home" sync
          "$exe" --home "$home" doctor 2>&1 | tee doctor-after-sync.log
          if grep -F "[fail]" doctor-after-sync.log; then
            exit 1
          fi

      - name: Smoke test executable on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $exe = Resolve-Path "smoke-bin/${{ matrix.asset }}"
          $home = Join-Path $env:RUNNER_TEMP "lazyvim-home"
          Remove-Item -Recurse -Force $home -ErrorAction SilentlyContinue

          & $exe --version
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          & $exe --home $home install-deps
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          & $exe --home $home doctor 2>&1 | Tee-Object -FilePath doctor.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if (Select-String -Path doctor.log -SimpleMatch "[fail]") { exit 1 }

          & $exe --home $home sync
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          & $exe --home $home doctor 2>&1 | Tee-Object -FilePath doctor-after-sync.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if (Select-String -Path doctor-after-sync.log -SimpleMatch "[fail]") { exit 1 }

  linux-distro-smoke:
    name: Linux distro smoke ${{ matrix.distro }}
    needs:
      - prepare
      - build
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: alpine
            image: alpine:3.20
          - distro: debian
            image: debian:12-slim
          - distro: arch
            image: archlinux:latest
          - distro: fedora
            image: fedora:latest
          - distro: amazonlinux
            image: amazonlinux:2023
          - distro: rhel
            image: rockylinux:9
    steps:
      - name: Download Linux executable artifact
        uses: actions/download-artifact@v4
        with:
          name: lazyvim-linux-x86_64
          path: smoke-bin

      - name: Smoke test Linux executable in ${{ matrix.distro }}
        shell: bash
        run: |
          set -euo pipefail
          chmod +x smoke-bin/lazyvim-linux-x86_64
          docker run --rm \
            -v "${PWD}/smoke-bin:/work:ro" \
            "${{ matrix.image }}" \
            sh -lc '
              set -eu
              cp /work/lazyvim-linux-x86_64 /tmp/lazyvim
              chmod +x /tmp/lazyvim
              home=/tmp/lazyvim-home
              rm -rf "$home"

              /tmp/lazyvim --version
              /tmp/lazyvim --home "$home" install-deps
              /tmp/lazyvim --home "$home" doctor 2>&1 | tee /tmp/doctor.log
              if grep -F "[fail]" /tmp/doctor.log; then
                exit 1
              fi
              /tmp/lazyvim --home "$home" sync
              /tmp/lazyvim --home "$home" doctor 2>&1 | tee /tmp/doctor-after-sync.log
              if grep -F "[fail]" /tmp/doctor-after-sync.log; then
                exit 1
              fi
            '

  release:
    name: Create GitHub Release
    needs:
      - prepare
      - build
      - smoke
      - linux-distro-smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.release_ref }}
          fetch-depth: 0

      - name: Download executable artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/artifacts
          merge-multiple: true

      - name: Generate checksums and release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          find dist/artifacts -type f | sort
          (cd dist/artifacts && sha256sum * > SHA256SUMS)

          repo="${GITHUB_REPOSITORY}"
          tag="v${VERSION}"
          previous_tag=""
          if previous_tag="$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null)"; then
            :
          else
            previous_tag=""
          fi

          range="HEAD"
          if [[ -n "$previous_tag" ]]; then
            range="${previous_tag}..HEAD"
          fi

          declare -A seen_prs=()
          prs_file="$(mktemp)"
          while IFS= read -r sha; do
            while IFS=$'\t' read -r number title user url; do
              [[ -n "${number:-}" ]] || continue
              if [[ -n "${seen_prs[$number]+x}" ]]; then
                continue
              fi
              seen_prs[$number]=1
              printf '%s\t%s\t%s\t%s\n' "$number" "$title" "$user" "$url" >> "$prs_file"
            done < <(
              gh api                 -H "Accept: application/vnd.github+json"                 "/repos/${repo}/commits/${sha}/pulls"                 --jq '.[] | [.number, .title, .user.login, .html_url] | @tsv' 2>/dev/null || true
            )
          done < <(git rev-list --reverse "$range")

          {
            echo "## What's Changed"
            echo

            if [[ -s "$prs_file" ]]; then
              while IFS=$'\t' read -r number title user url; do
                echo "- ${title} by @${user} in ${url}"
              done < "$prs_file"
            else
              echo "No pull requests were included in this release."
            fi

            echo
            if [[ -n "$previous_tag" ]]; then
              echo "**Full Changelog**: https://github.com/${repo}/compare/${previous_tag}...${tag}"
            else
              echo "Initial release."
            fi
          } > dist/release-notes.md
          rm -f "$prs_file"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
          RELEASE_REF: ${{ needs.prepare.outputs.release_ref }}
          DRAFT: ${{ inputs.draft }}
          PRERELEASE: ${{ inputs.prerelease }}
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t assets < <(find dist/artifacts -type f | sort)
          release_flags=()
          if [[ "$DRAFT" == "true" ]]; then
            release_flags+=(--draft)
          fi
          if [[ "$PRERELEASE" == "true" ]]; then
            release_flags+=(--prerelease)
          fi

          gh release create "$TAG" "${assets[@]}"             --target "$RELEASE_REF"             --title "$TAG"             --notes-file dist/release-notes.md             "${release_flags[@]}"
