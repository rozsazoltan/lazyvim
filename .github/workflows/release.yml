name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, without leading v. Example: 0.1.1"
        required: true
        type: string
      target_branch:
        description: "Branch to release from and squash version updates into"
        required: true
        default: master
        type: string
      neovim_version:
        description: "Neovim release tag to bundle. Example: stable, nightly, v0.12.2"
        required: true
        default: stable
        type: string
      bundle_neovim:
        description: "Download and include Neovim in release packages"
        required: true
        default: true
        type: boolean
      draft:
        description: "Create the GitHub Release as a draft"
        required: true
        default: false
        type: boolean
      prerelease:
        description: "Mark the GitHub Release as a prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.target_branch }}-${{ inputs.version }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      release_ref: ${{ steps.final.outputs.release_ref }}
      changed: ${{ steps.diff.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate version
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          if [[ ! "$version" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid SemVer version: $version" >&2
            exit 2
          fi
          tag="v${version}"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag already exists: ${tag}" >&2
            exit 2
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Update version files
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/set-version.py "${{ steps.meta.outputs.version }}"
          cargo generate-lockfile

      - name: Check whether version files changed
        id: diff
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- Cargo.toml Cargo.lock VERSION; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Squash version changes into target branch
        if: steps.diff.outputs.changed == 'true'
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
        shell: bash
        run: |
          set -euo pipefail
          release_branch="chore/release-${VERSION}"
          title="chore(release): ${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -B "$release_branch"
          git add Cargo.toml Cargo.lock VERSION
          git commit -m "$title"
          git push --force origin "HEAD:${release_branch}"

          git fetch origin "$TARGET_BRANCH"
          git checkout -B "$TARGET_BRANCH" "origin/${TARGET_BRANCH}"
          git merge --squash "$release_branch"
          git commit -m "$title"
          git push origin "HEAD:${TARGET_BRANCH}"

      - name: Resolve release ref
        id: final
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin "${{ inputs.target_branch }}"
          release_ref="$(git rev-parse "origin/${{ inputs.target_branch }}")"
          echo "release_ref=${release_ref}" >> "$GITHUB_OUTPUT"
          echo "Release ref: ${release_ref}"

  build:
    name: Build ${{ matrix.platform }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            package_script: unix
          - platform: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            package_script: windows
          - platform: macos-x86_64
            os: macos-15-intel
            target: x86_64-apple-darwin
            package_script: unix
          - platform: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            package_script: unix
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.release_ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package Unix
        if: matrix.package_script == 'unix'
        shell: bash
        run: |
          chmod +x scripts/package-unix.sh
          scripts/package-unix.sh \
            "${{ matrix.target }}" \
            "${{ matrix.platform }}" \
            "${{ needs.prepare.outputs.version }}" \
            "${{ inputs.bundle_neovim }}" \
            "${{ inputs.neovim_version }}"

      - name: Package Windows
        if: matrix.package_script == 'windows'
        shell: pwsh
        run: |
          ./scripts/package-windows.ps1 `
            -Target "${{ matrix.target }}" `
            -Platform "${{ matrix.platform }}" `
            -Version "${{ needs.prepare.outputs.version }}" `
            -BundleNeovim "${{ inputs.bundle_neovim }}" `
            -NeovimVersion "${{ inputs.neovim_version }}"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: lazyvim-${{ needs.prepare.outputs.version }}-${{ matrix.platform }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error
          retention-days: 7

  release:
    name: Create GitHub Release
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.release_ref }}
          fetch-depth: 0

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/artifacts
          merge-multiple: true

      - name: Generate checksums and release notes
        shell: bash
        run: |
          set -euo pipefail
          find dist/artifacts -type f | sort
          (cd dist/artifacts && sha256sum * > SHA256SUMS)
          chmod +x scripts/release-notes.sh
          scripts/release-notes.sh "${{ needs.prepare.outputs.version }}" dist/release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
          RELEASE_REF: ${{ needs.prepare.outputs.release_ref }}
          DRAFT: ${{ inputs.draft }}
          PRERELEASE: ${{ inputs.prerelease }}
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t assets < <(find dist/artifacts -type f | sort)
          release_flags=()
          if [[ "$DRAFT" == "true" ]]; then
            release_flags+=(--draft)
          fi
          if [[ "$PRERELEASE" == "true" ]]; then
            release_flags+=(--prerelease)
          fi

          gh release create "$TAG" "${assets[@]}" \
            --target "$RELEASE_REF" \
            --title "$TAG" \
            --notes-file dist/release-notes.md \
            "${release_flags[@]}"
