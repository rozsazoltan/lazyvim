name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, without leading v. Example: 0.1.1"
        required: true
        type: string
      target_branch:
        description: "Branch to release from and squash version updates into"
        required: true
        default: master
        type: string
      draft:
        description: "Create the GitHub Release as a draft"
        required: true
        default: false
        type: boolean
      prerelease:
        description: "Mark the GitHub Release as a prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.target_branch }}-${{ inputs.version }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      release_ref: ${{ steps.final.outputs.release_ref }}
      changed: ${{ steps.diff.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate version
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          if [[ ! "$version" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid SemVer version: $version" >&2
            exit 2
          fi
          tag="v${version}"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag already exists: ${tag}" >&2
            exit 2
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Update Rust package version
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/set-version.py "${{ steps.meta.outputs.version }}"
          cargo generate-lockfile

      - name: Check whether package version changed
        id: diff
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- Cargo.toml Cargo.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Squash version changes into target branch
        if: steps.diff.outputs.changed == 'true'
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
        shell: bash
        run: |
          set -euo pipefail
          release_branch="chore/release-${VERSION}"
          title="chore(release): ${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -B "$release_branch"
          git add Cargo.toml Cargo.lock
          git commit -m "$title"
          git push --force origin "HEAD:${release_branch}"

          git fetch origin "$TARGET_BRANCH"
          git checkout -B "$TARGET_BRANCH" "origin/${TARGET_BRANCH}"
          git merge --squash "$release_branch"
          git commit -m "$title"
          git push origin "HEAD:${TARGET_BRANCH}"

      - name: Resolve release ref
        id: final
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin "${{ inputs.target_branch }}"
          release_ref="$(git rev-parse "origin/${{ inputs.target_branch }}")"
          echo "release_ref=${release_ref}" >> "$GITHUB_OUTPUT"
          echo "Release ref: ${release_ref}"

  build:
    name: Build ${{ matrix.platform }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: lazyvim-linux-x86_64
          - platform: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: lazyvim-windows-x86_64.exe
          - platform: macos-x86_64
            os: macos-15-intel
            target: x86_64-apple-darwin
            asset: lazyvim-macos-x86_64
          - platform: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            asset: lazyvim-macos-arm64
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.release_ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Prepare executable asset
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          extension=""
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            extension=".exe"
          fi

          source="target/${{ matrix.target }}/release/lazyvim${extension}"
          asset="dist/${{ matrix.asset }}"

          cp "$source" "$asset"
          if [[ "$extension" != ".exe" ]]; then
            chmod 755 "$asset"
          fi
          ls -lah "$asset"

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Create GitHub Release
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.release_ref }}
          fetch-depth: 0

      - name: Download executable artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/artifacts
          merge-multiple: true

      - name: Generate checksums and release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          find dist/artifacts -type f | sort
          (cd dist/artifacts && sha256sum * > SHA256SUMS)
          chmod +x scripts/release-notes.sh
          scripts/release-notes.sh "${{ needs.prepare.outputs.version }}" dist/release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
          RELEASE_REF: ${{ needs.prepare.outputs.release_ref }}
          DRAFT: ${{ inputs.draft }}
          PRERELEASE: ${{ inputs.prerelease }}
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t assets < <(find dist/artifacts -type f | sort)
          release_flags=()
          if [[ "$DRAFT" == "true" ]]; then
            release_flags+=(--draft)
          fi
          if [[ "$PRERELEASE" == "true" ]]; then
            release_flags+=(--prerelease)
          fi

          gh release create "$TAG" "${assets[@]}"             --target "$RELEASE_REF"             --title "$TAG"             --notes-file dist/release-notes.md             "${release_flags[@]}"
